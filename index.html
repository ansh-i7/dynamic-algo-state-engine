<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DASE: Dynamic Algo State Engine</title>
    <link rel = "stylesheet"href = "style.css"?
  </head>
  <body>
    <header>
      <h1>DASE <span class="subtitle">| Dynamic Algo State Engine</span></h1>
        <div class="controls">
            <button id="generate-btn">Generate New Array</button>
            <button id="sort-btn">Start Sorting Engine</button>
        </div>
        <div class="sliders">
            <div class="slider-container">
                <label for="size-slider">Array Size</label>
                <input type="range" id="size-slider" min="10" max="100" value="30">
            </div>
            <div class="slider-container">
                <label for="speed-slider">Sorting Speed</label>
                <input type="range" id="speed-slider" min="1" max="100" value="60">
            </div>
        </div>
    </header>
    <main>
        <div id="visualizer-container" class="container"></div>
    </main>
    <script src="app.js"></script>
</body>
</html
  </body>
</html>
